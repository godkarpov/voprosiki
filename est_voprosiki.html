<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .header {

  }

  .logo {

  }

  .logo span {

    margin-left: 4px;

  }

  /* Filters */
  .filters {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 2rem;
  }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .filter-label {
    font-size: 10px;
    font-weight: 600;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    width: 70px;
    flex-shrink: 0;
  }

  .chip {
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 99px;
    border: 1.5px solid #1a1a1a;
    background: transparent;
    color: #1a1a1a;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    user-select: none;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }

  .chip:hover { background: #e3e0d8; }
  .chip.active { background: #1a1a1a; color: #F0EDE6; }

  /* Divider */
  .divider {
    height: 1px;
    background: rgba(26,26,26,0.12);
    margin-bottom: 2rem;
  }

  /* Card */
  .card-wrap {
    display: flex;
    justify-content: center;
  }

  .card {
    background: #fff;
    border: 1.5px solid #1a1a1a;
    border-radius: 24px;
    width: 100%;
    min-height: 260px;
    padding: 1.75rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    transition: transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .card:active { transform: scale(0.99); }

  .card-badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 99px;
    border: 1.5px solid #1a1a1a;
    background: #F0EDE6;
    color: #1a1a1a;
    white-space: nowrap;
  }

  .badge-mechanic {
    background: #1a1a1a;
    color: #F0EDE6;
  }

  .card-question {
    font-size: 21px;
    font-weight: 500;
    line-height: 1.42;
    color: #1a1a1a;
    letter-spacing: -0.3px;
    flex: 1;
  }

  /* Nav */
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    margin-top: 1.75rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e5e2da;
    gap: 8px;
  }

  .nav-btn {
    height: 44px;
    padding: 0 20px;
    border-radius: 99px;
    border: 2px solid #1a1a1a;
    background: transparent;
    color: #1a1a1a;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    transition: background 0.12s, opacity 0.12s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;

  .nav-btn.next {
    background: #1a1a1a;
    color: #F0EDE6;
  }

  .nav-btn.next:hover { opacity: 0.85; }

  .arrow {
    font-size: 18px;
    line-height: 1;
    font-weight: 400;
  }

  /* Hint */
  .hint {
    text-align: center;
    font-size: 11px;
    color: #bbb;
    font-weight: 500;
    margin-top: 1.25rem;
    letter-spacing: 0.01em;

    .card { padding: 1.25rem; min-height: 220px; }
    .card-question { font-size: 18px; }

let activeTopic = "all";
let activeMechanic = "all";
let filtered = [];
let idx = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getFiltered() {
  return ALL_QUESTIONS.filter(q => {
    const tOk = activeTopic === "all" || q.topic === activeTopic;
    const mOk = activeMechanic === "all" || q.mechanic === activeMechanic;
    return tOk && mOk;
  });
}

function render() {
  if (filtered.length === 0) {
    document.getElementById("badge-topic").textContent = "—";
    document.getElementById("badge-mechanic").textContent = "—";
    document.getElementById("card-question").textContent = "Нет вопросов с такими фильтрами 🤔";
    return;
  }
  const card = filtered[idx];
  document.getElementById("badge-topic").textContent = card.topic;
  document.getElementById("badge-mechanic").textContent = card.mechanic;
  document.getElementById("card-question").textContent = card.q;
}

function nextCard() {
  if (!filtered.length) return;
  idx = (idx + 1) % filtered.length;
  render();
}

function prevCard() {
  if (!filtered.length) return;
  idx = (idx - 1 + filtered.length) % filtered.length;
  render();
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") nextCard();
  if (e.key === "ArrowLeft") prevCard();
});

// Touch swipe support
let touchStartX = 0;
document.getElementById("card").addEventListener("touchstart", e => {
  touchStartX = e.touches[0].clientX;
}, {passive: true});
document.getElementById("card").addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    if (dx < 0) nextCard(); else prevCard();
  }
}, {passive: true});

document.querySelectorAll(".chip").forEach(chip => {
  chip.addEventListener("click", () => {
    const type = chip.dataset.type;
    const val = chip.dataset.val;
    if (type === "topic") {
      activeTopic = val;
      document.querySelectorAll("[data-type='topic']").forEach(c => c.classList.remove("active"));
    } else {
      activeMechanic = val;
      document.querySelectorAll("[data-type='mechanic']").forEach(c => c.classList.remove("active"));
    }
    chip.classList.add("active");
    filtered = shuffle(getFiltered());
    idx = 0;
    render();
  });
});

filtered = shuffle(getFiltered());
render();
