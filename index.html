<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Есть вопросики</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #F0EDE6;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    color: #1a1a1a;
  }

  .app {
    max-width: 640px;
    margin: 0 auto;
    padding: 2rem 1.25rem 3rem;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .logo {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .filters {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 1rem;
  }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    padding: 14px 16px;
    border-radius: 18px;
  }

  /* Тематики — светло-серый фон */
  .filter-row-topic {
    background: #EBEBEB;
    border: 1px solid rgba(26,26,26,0.06);
  }

  /* Механики — светло-жёлтый фон */
  .filter-row-mechanic {
    background: #FFFBEE;
    border: 1px solid rgba(245,200,66,0.5);
  }

  .filter-label {
    font-size: 10px;
    font-weight: 600;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    width: 70px;
    flex-shrink: 0;
  }

  .chip {
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 99px;
    border: 1.5px solid #1a1a1a;
    background: transparent;
    color: #1a1a1a;
    cursor: pointer;
    transition: background-color 0.2s, color 0.2s, border-color 0.2s;
    user-select: none;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }

  .chip:hover { background: rgba(26,26,26,0.06); }

  /* Активный чип тематики — чёрный с белым текстом */
  .chip[data-type='topic'].active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  /* Активный чип механики — собственный акцентный цвет каждой механики.
     Светлые пастельные тона → тёмный текст (контрастнее); нейтральный «Все» → белый */
  .chip[data-type='mechanic'][data-val='all'].active        { background: #1a1a1a; color: #fff;     border-color: #1a1a1a; }
  .chip[data-type='mechanic'][data-val='Или-или'].active    { background: #5B8DEF; color: #1a1a1a;  border-color: #5B8DEF; }
  .chip[data-type='mechanic'][data-val='А если бы'].active  { background: #A78BDB; color: #1a1a1a;  border-color: #A78BDB; }
  .chip[data-type='mechanic'][data-val='Твоя оценка'].active{ background: #6FBF8B; color: #1a1a1a;  border-color: #6FBF8B; }
  .chip[data-type='mechanic'][data-val='Концепция'].active  { background: #E8A951; color: #1a1a1a;  border-color: #E8A951; }

  .divider {
    height: 1px;
    background: rgba(26,26,26,0.12);
    margin-bottom: 1rem;
  }

  .card-wrap {
    display: flex;
    justify-content: center;
  }

  .card {
    background: #fff;
    border: 1.5px solid #1a1a1a;
    border-radius: 24px;
    width: 100%;
    min-height: 260px;
    padding: 1.75rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    transition: transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .card:active { transform: scale(0.99); }

  .card-badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 99px;
    border: 1.5px solid #1a1a1a;
    background: #F0EDE6;
    color: #1a1a1a;
  }

  .badge-mechanic {
    background: #1a1a1a;
    color: #fff;
    transition: background-color 0.2s, color 0.2s, border-color 0.2s;
  }

  .card-question {
    font-size: 21px;
    font-weight: 500;
    line-height: 1.42;
    color: #1a1a1a;
    letter-spacing: -0.3px;
    flex: 1;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    margin-top: 1.75rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e5e2da;
    gap: 8px;
  }

  .nav-btn {
    height: 44px;
    padding: 0 20px;
    border-radius: 99px;
    border: 2px solid #1a1a1a;
    background: transparent;
    color: #1a1a1a;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    transition: background 0.12s, opacity 0.12s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }

  .nav-btn:hover { background: #e3e0d8; }

  .nav-btn.next {
    background: #1a1a1a;
    color: #F0EDE6;
  }

  .nav-btn.next:hover { opacity: 0.85; }

  .hint {
    text-align: center;
    font-size: 11px;
    color: #bbb;
    font-weight: 500;
    margin-top: 1.25rem;
  }

  /* Pixel man */
  .pixel-man {
    display: block;
    width: 56px;
    height: 60px;
    margin: 20px auto 0;
    --pm-color: #E74C3C; /* «Все механики» → красный */
  }
  .pixel-man.m-or      { --pm-color: #5B8DEF; } /* Или-или → синий */
  .pixel-man.m-if      { --pm-color: #A78BDB; } /* А если бы → фиолетовый */
  .pixel-man.m-rate    { --pm-color: #6FBF8B; } /* Твоя оценка → зелёный */
  .pixel-man.m-concept { --pm-color: #E8A951; } /* Концепция → оранжево-жёлтый */
  .pixel-man.spicy     { --pm-color: #E74C3C; } /* тема «Остренькие» → красный (приоритет) */

  .pixel-man svg { width: 100%; height: 100%; overflow: visible; display: block; }

  .pm-body { fill: var(--pm-color); transition: fill 300ms ease; }

  .pm-figure, .pm-hat, .pm-arm-r {
    transform-box: fill-box;
  }
  .pm-figure { transform-origin: 50% 100%; }
  .pm-hat   { transform-origin: 50% 100%; }
  .pm-arm-r { transform-origin: 0% 0%; }

  /* Поклон: фигура наклоняется и снимает шляпу, затем возвращается */
  .pm-figure.bow { animation: pm-bow 300ms ease; }
  .pm-figure.bow .pm-hat { animation: pm-tiphat 300ms ease; }
  @keyframes pm-bow {
    0%   { transform: rotate(0); }
    45%  { transform: rotate(18deg); }
    65%  { transform: rotate(18deg); }
    100% { transform: rotate(0); }
  }
  @keyframes pm-tiphat {
    0%   { transform: translate(0,0) rotate(0); }
    45%  { transform: translate(-3px,-5px) rotate(-30deg); }
    65%  { transform: translate(-3px,-5px) rotate(-30deg); }
    100% { transform: translate(0,0) rotate(0); }
  }

  /* Прыжок при смене механики */
  .pixel-man svg.jump { animation: pm-jump 200ms ease; }
  @keyframes pm-jump {
    0%   { transform: translateY(0); }
    50%  { transform: translateY(-10px); }
    100% { transform: translateY(0); }
  }

  /* Чешет голову при простое */
  .pixel-man.scratch .pm-arm-r { animation: pm-scratch 0.55s ease-in-out infinite; }
  @keyframes pm-scratch {
    0%, 100% { transform: rotate(148deg); }
    50%      { transform: rotate(158deg); }
  }

  /* Лёгкая тряска на теме «Остренькие» */
  .pixel-man.spicy { animation: pm-shake 0.25s ease-in-out infinite; }
  @keyframes pm-shake {
    0%, 100% { transform: translateX(0); }
    25%      { transform: translateX(-1.5px); }
    75%      { transform: translateX(1.5px); }
  }

  @media (max-width: 480px) {
    .app { padding: 1.25rem 1rem 2.5rem; }
    .logo { font-size: 17px; }
    .card { padding: 1.25rem; min-height: 220px; }
    .card-question { font-size: 18px; }
    .hint { display: none; }

    /* Аккуратный перенос чипов: метка на отдельной строке, компактные чипы по контенту */
    .filter-row {
      padding: 10px 12px;
      gap: 7px 6px; /* вертикальный отступ чуть больше горизонтального */
    }
    .filter-label {
      flex: 0 0 100%;   /* отдельная строка над чипами */
      width: auto;      /* убираем фиксированную ширину 70px */
      font-size: 9px;
      margin-bottom: 6px;
    }
    .chip {
      padding: 5px 10px;
      font-size: 11px;
      flex: none;        /* ширина по контенту, не на всю строку */
    }
  }
</style>

  <p class="hint">нажмите на карточку или используйте ← →</p>

let activeTopic = "all";
let activeMechanic = "all";
let filtered = [];
let idx = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getFiltered() {
  return ALL_QUESTIONS.filter(q => {
    const tOk = activeTopic === "all" || q.topic === activeTopic;
    const mOk = activeMechanic === "all" || q.mechanic === activeMechanic;
    return tOk && mOk;
  });
}

// Единая палитра механик: один акцентный цвет на чип, бейдж и человечка
const MECH_COLOR = {
  "Или-или": "#5B8DEF",
  "А если бы": "#A78BDB",
  "Твоя оценка": "#6FBF8B",
  "Концепция": "#E8A951"
};

function paintMechBadge(mechanic) {
  const badge = document.getElementById("badge-mechanic");
  const color = MECH_COLOR[mechanic];
  if (color) {
    badge.style.backgroundColor = color;
    badge.style.borderColor = color;
    badge.style.color = "#1a1a1a"; // тёмный текст контрастнее на пастельных тонах
  } else {
    badge.style.backgroundColor = "#1a1a1a";
    badge.style.borderColor = "#1a1a1a";
    badge.style.color = "#fff";
  }
}

function render() {
  if (filtered.length === 0) {
    document.getElementById("badge-topic").textContent = "—";
    document.getElementById("badge-mechanic").textContent = "—";
    paintMechBadge(null);
    document.getElementById("card-question").textContent = "Нет вопросов 🤔";
    return;
  }
  const card = filtered[idx];
  document.getElementById("badge-topic").textContent = card.topic;
  document.getElementById("badge-mechanic").textContent = card.mechanic;
  paintMechBadge(card.mechanic);
  document.getElementById("card-question").textContent = card.q;
}

  const cls = MECH_CLASS[activeMechanic];
  if (cls) pixelMan.classList.add(cls);
  pixelMan.classList.toggle("spicy", activeTopic === "Остренькие / провокационные");
}

function triggerBow() {
  pixelMan.classList.remove("scratch");
  pmFigure.classList.remove("bow");
  void pmFigure.offsetWidth; // рестарт анимации
  pmFigure.classList.add("bow");
}

function triggerJump() {
  pixelMan.classList.remove("scratch");
  pmSvg.classList.remove("jump");
  void pmSvg.offsetWidth;
  pmSvg.classList.add("jump");
}

function resetIdle() {
  pixelMan.classList.remove("scratch");
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => pixelMan.classList.add("scratch"), 10000);
}

pmFigure.addEventListener("animationend", e => {
  if (e.animationName === "pm-bow") pmFigure.classList.remove("bow");
});
pmSvg.addEventListener("animationend", e => {
  if (e.animationName === "pm-jump") pmSvg.classList.remove("jump");
});

function nextCard() {
  if (!filtered.length) return;
  idx = (idx + 1) % filtered.length;
  render();
  triggerBow();
  resetIdle();
}

function prevCard() {
  if (!filtered.length) return;
  idx = (idx - 1 + filtered.length) % filtered.length;
  render();
  triggerBow();
  resetIdle();
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") nextCard();
  if (e.key === "ArrowLeft") prevCard();
});

let touchStartX = 0;
document.getElementById("card").addEventListener("touchstart", e => {
  touchStartX = e.touches[0].clientX;
}, {passive: true});
document.getElementById("card").addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    if (dx < 0) nextCard(); else prevCard();
  }
}, {passive: true});

document.querySelectorAll(".chip").forEach(chip => {
  chip.addEventListener("click", () => {
    const type = chip.dataset.type;
    const val = chip.dataset.val;
    if (type === "topic") {
      activeTopic = val;
      document.querySelectorAll("[data-type='topic']").forEach(c => c.classList.remove("active"));
    } else {
      activeMechanic = val;
      document.querySelectorAll("[data-type='mechanic']").forEach(c => c.classList.remove("active"));
    }
    chip.classList.add("active");
    filtered = shuffle(getFiltered());
    idx = 0;
    render();
    applyManColor();
    if (type === "mechanic") triggerJump(); else triggerBow();
    resetIdle();
  });
});

filtered = shuffle(getFiltered());
render();
applyManColor();
resetIdle();
</script>
</body>
</html>
